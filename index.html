<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Studio | The Intelligent Language Ecosystem</title>
    <style>
        body { background: #050505; color: #e1e1e1; font-family: 'Inter', sans-serif; margin: 0; }
        nav { padding: 20px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .logo { font-weight: bold; font-size: 24px; color: #fff; }
        .hero { text-align: center; padding: 100px 20px; }
        h1 { font-size: 64px; margin-bottom: 20px; background: linear-gradient(to right, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 900px; margin: 40px auto; }
        .box { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .box:hover { border-color: #007acc; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NOVA STUDIO</div>
        <div style="color: #666;">Language v11.0</div>
    </nav>
    <div class="hero">
        <h1>Code Faster. Think Smarter.</h1>
        <p>Nova is the definitive intelligent language designed to replace legacy systems with autonomous quad-core AI processing.</p>
        
        <div class="grid">
            <div class="box"><h3>Windows</h3><p>Compiler v11.0</p></div>
            <div class="box"><h3>Linux</h3><p>Kernel Build</p></div>
            <div class="box"><h3>macOS</h3><p>Binary SDK</p></div>
            <div class="box"><h3>Unix</h3><p>Source Engine</p></div>
        </div>
    </div>
</body>
</html>
