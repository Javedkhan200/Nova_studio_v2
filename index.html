<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Studio | Professional OS Installer</title>
    <style>
        :root { --blue: #007acc; --white: #ffffff; --black: #050505; --dark-gray: #1a1a1a; }
        body { background: var(--black); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); }
        .logo { font-size: 28px; font-weight: bold; color: var(--blue); }
        .hero { text-align: center; padding: 80px 20px; }
        h1 { font-size: 60px; margin-bottom: 10px; }
        .installer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1000px; margin: 50px auto; }
        .inst-btn { background: var(--dark-gray); border: 2px solid var(--blue); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .inst-btn:hover { background: var(--blue); transform: translateY(-5px); }
        .inst-btn h3 { margin: 0; }
        .inst-btn p { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Nova Studio OS</div>
        <div style="color: var(--blue);">v11.0.0 Global Stable</div>
    </header>
    <div class="hero">
        <h1>Advanced AI OS Language</h1>
        <p>The ultimate multi-platform ecosystem for developers.</p>
        
        <div class="installer-grid">
            <div class="inst-btn" onclick="alert('Downloading Windows Installer...')"><h3>Windows</h3><p>.exe Installer</p></div>
            <div class="inst-btn" onclick="alert('Downloading Linux .deb...')"><h3>Linux</h3><p>DEB / RPM Package</p></div>
            <div class="inst-btn" onclick="alert('Downloading macOS DMG...')"><h3>macOS</h3><p>Apple Silicon / Intel</p></div>
            <div class="inst-btn" onclick="alert('Downloading Unix Source...')"><h3>Unix</h3><p>Source Compiling</p></div>
        </div>
    </div>
</body>
</html>
