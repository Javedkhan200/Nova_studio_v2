<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Studio v2 - Enterprise Edition</title>
    <style>
        body { background: #282c34; color: #abb2bf; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { background: #21252b; border-left: 4px solid #c678dd; padding: 15px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .prompt { color: #c678dd; font-weight: bold; }
        .ai-tag { color: #61afef; }
        .success { color: #98c379; }
        .header { border-bottom: 1px solid #3e4451; padding-bottom: 10px; margin-bottom: 15px; color: #d19a66; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">Nova Studio Engine v11.0.0 [Production-Ready Commercial Build]</div>
        <p><span class="prompt">>>></span> NOVA.mode("Autonomous-AI-REPL")</p>
        <p><span class="prompt">>>></span> NOVA.ai_chat()</p>
        <p class="success">🤖 [NOVA QUAD-CORE AI REPL ACTIVATED]</p>
        <p><span class="ai-tag">nova-ai ></span> Hello Operator Jack! Local Core-02 Neural-NLP is online. Ready to build apps or compile custom kernels.</p>
    </div>
</body>
</html>
