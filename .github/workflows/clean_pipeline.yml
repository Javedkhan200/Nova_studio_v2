name: Nova Multi-OS Global Exporter Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Execute Autonomous Core Verification
      run: |
        python3 finalize_master_language.py ai_test_code.nova
        echo "✅ [SUCCESS] Core Verified Safe For Deployment!"
