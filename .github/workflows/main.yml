name: Nova Multi-OS Global Exporter Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.11'

    - name: Verify Nova Core Structure
      run: |
        python3 finalize_master_language.py ai_test_code.nova
        echo "✅ Core Interpreter and Test Script Executed Successfully!"
